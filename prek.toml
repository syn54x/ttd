[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
]

# Local hooks run on `git commit` after `uv run prek install` (see just setup).
# `just check` mirrors ruff + ty only; `prek run --all-files` is full CI parity.
[[repos]]
repo = "local"
hooks = [
  { id = "ruff-check", name = "ruff check", entry = "uv run ruff check --fix .", language = "system", pass_filenames = false, always_run = true },
  { id = "ruff-format", name = "ruff format", entry = "uv run ruff format .", language = "system", pass_filenames = false, always_run = true },
  { id = "ty-check", name = "ty check", entry = "uv run ty check", language = "system", pass_filenames = false, always_run = true },
  { id = "pytest", name = "pytest", entry = "uv run pytest", language = "system", pass_filenames = false, always_run = true },
  { id = "zensical-build", name = "zensical build", entry = "uv run zensical build --clean", language = "system", pass_filenames = false, always_run = true },
  { id = "ce-artifacts-not-in-docs", name = "CE artifacts not in docs/", entry = "bash -c 'if [ -e docs/brainstorms ] || [ -e docs/plans ]; then echo \"CE planning artifacts belong at repo root (brainstorms/, plans/), not under docs/. See .cursor/rules/ce-planning-artifacts.mdc\"; exit 1; fi'", language = "system", pass_filenames = false, always_run = true },
]

[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.8.3"
hooks = [
  { id = "commitizen", stages = ["commit-msg"] },
]
