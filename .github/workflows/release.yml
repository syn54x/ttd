name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ttd-ledger
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        run: uv run cz bump --yes --check-consistency --changelog --changelog-to-stdout > release-body.md

      - name: Verify release body
        run: test -s release-body.md

      - name: Verify release version
        run: |
          python3 - <<'EOF'
          import re
          import subprocess
          import sys
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          match = re.search(r'^\[project\][\s\S]*?^version = "([^"]+)"', text, re.MULTILINE)
          if not match:
              sys.exit("missing [project].version in pyproject.toml")
          project_version = match.group(1)
          tag = subprocess.check_output(
              ["git", "describe", "--tags", "--abbrev=0"], text=True
          ).strip().removeprefix("v")
          if project_version != tag:
              sys.exit(
                  f"version mismatch: [project].version={project_version!r} tag=v{tag!r}"
              )
          print(f"release version ok: {project_version}")
          EOF

      - name: Push release commit and tag
        run: git push origin main --follow-tags

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-body.md \
            dist/*.tar.gz dist/*.whl

  docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build documentation
        run: uv run zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
