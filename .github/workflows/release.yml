name: Release

on:
  workflow_dispatch:
    inputs:
      publish_only:
        description: Skip cz bump; publish current version on main (failed-publish recovery)
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ttd-ledger
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Org PAT (bypasses branch protection for cz bump push to main).
          token: ${{ secrets.GH_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        if: ${{ !inputs.publish_only }}
        run: uv run cz bump --yes --check-consistency --changelog --changelog-to-stdout > release-body.md

      - name: Prepare release body (publish-only recovery)
        if: ${{ inputs.publish_only }}
        run: |
          python3 - <<'EOF'
          import re
          import sys
          from pathlib import Path

          version = re.search(
              r'^version = "([^"]+)"',
              Path("pyproject.toml").read_text(),
              re.MULTILINE,
          )
          if not version:
              sys.exit("missing [project].version in pyproject.toml")
          version = version.group(1)
          changelog = Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## v{re.escape(version)} \(.*?\)\n(?P<body>(?:\n(?!## ).*)*)",
              changelog,
              re.MULTILINE,
          )
          if not match:
              sys.exit(f"no CHANGELOG section for v{version}")
          Path("release-body.md").write_text(match.group("body").strip() + "\n")
          print(f"release body ok for v{version}")
          EOF

      - name: Verify release body
        run: test -s release-body.md

      - name: Verify release version
        run: |
          python3 - <<'EOF'
          import re
          import subprocess
          import sys
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          match = re.search(r'^\[project\][\s\S]*?^version = "([^"]+)"', text, re.MULTILINE)
          if not match:
              sys.exit("missing [project].version in pyproject.toml")
          project_version = match.group(1)
          tag = subprocess.check_output(
              ["git", "describe", "--tags", "--abbrev=0", "--match", "v*"], text=True
          ).strip().removeprefix("v")
          if project_version != tag:
              sys.exit(
                  f"version mismatch: [project].version={project_version!r} tag=v{tag!r}"
              )
          print(f"release version ok: {project_version}")
          EOF

      - name: Push release commit and tag
        if: ${{ !inputs.publish_only }}
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*')
          git push origin main
          git push origin "${TAG}"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*')
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-body.md \
            dist/*.tar.gz dist/*.whl

  docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build documentation
        run: uv run zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
