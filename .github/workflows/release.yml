name: Release

on:
  workflow_dispatch:
    inputs:
      publish_only:
        description: Skip cz bump; publish current version on main (failed-publish recovery)
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Verify release app is configured
        run: |
          if [ -z "${{ vars.RELEASE_APP_ID }}" ]; then
            echo "::error::RELEASE_APP_ID is not set. Add the GitHub App ID as an org or repo variable."
            exit 1
          fi
          if [ -z "${{ secrets.RELEASE_APP_PRIVATE_KEY }}" ]; then
            echo "::error::RELEASE_APP_PRIVATE_KEY is not available. Grant the org secret to syn54x/ttd."
            exit 1
          fi

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: syn54x
          repositories: ttd

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        if: ${{ !inputs.publish_only }}
        run: uv run cz bump --yes --check-consistency --changelog --changelog-to-stdout > release-body.md

      - name: Prepare release body (publish-only recovery)
        if: ${{ inputs.publish_only }}
        run: |
          python3 - <<'EOF'
          import re
          import sys
          from pathlib import Path

          version = re.search(
              r'^version = "([^"]+)"',
              Path("pyproject.toml").read_text(),
              re.MULTILINE,
          )
          if not version:
              sys.exit("missing [project].version in pyproject.toml")
          version = version.group(1)
          changelog = Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## v{re.escape(version)} \(.*?\)\n(?P<body>(?:\n(?!## ).*)*)",
              changelog,
              re.MULTILINE,
          )
          if not match:
              sys.exit(f"no CHANGELOG section for v{version}")
          Path("release-body.md").write_text(match.group("body").strip() + "\n")
          print(f"release body ok for v{version}")
          EOF

      - name: Verify release body
        run: test -s release-body.md

      - name: Verify release version
        run: |
          python3 - <<'EOF'
          import re
          import subprocess
          import sys
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          match = re.search(r'^\[project\][\s\S]*?^version = "([^"]+)"', text, re.MULTILINE)
          if not match:
              sys.exit("missing [project].version in pyproject.toml")
          project_version = match.group(1)
          tag = subprocess.check_output(
              ["git", "describe", "--tags", "--abbrev=0", "--match", "v*"], text=True
          ).strip().removeprefix("v")
          if project_version != tag:
              sys.exit(
                  f"version mismatch: [project].version={project_version!r} tag=v{tag!r}"
              )
          print(f"release version ok: {project_version}")
          EOF

      - name: Push release commit and tag
        if: ${{ !inputs.publish_only }}
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*')
          git push origin main
          git push origin "${TAG}"

      - id: tag
        run: echo "tag=$(git describe --tags --abbrev=0 --match 'v*')" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: release-body.md

  publish:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ttd-ledger
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: syn54x
          repositories: ttd

      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-body
          path: .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ needs.release.outputs.tag }}" \
            --title "${{ needs.release.outputs.tag }}" \
            --notes-file release-body.md \
            dist/*.tar.gz dist/*.whl

  docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build documentation
        run: uv run zensical build --clean

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
